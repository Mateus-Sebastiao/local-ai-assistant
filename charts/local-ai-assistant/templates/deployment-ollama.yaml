apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-assistant.fullname" . }}-deployment-ollama
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "devops-assistant.labels" . | nindent 4 }}
    app.kubernetes.io/component: ollama
spec:
  replicas: {{ .Values.ollama.replicaCount }}
  selector:
    matchLabels:
      {{- include "devops-assistant.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ollama
  template:
    metadata:
      labels:
        {{- include "devops-assistant.labels" . | nindent 8 }}
        app.kubernetes.io/component: ollama
    spec:
      containers:
        - name: {{ .Chart.Name }}-ollama
          image: {{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}
          ports:
            - containerPort: {{ .Values.ollama.service.targetPort }}

          {{- with .Values.ollama.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ollama.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.ollama.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}