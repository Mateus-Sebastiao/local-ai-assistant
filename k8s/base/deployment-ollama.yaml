apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: devops-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: ollama/ollama:latest
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          volumeMounts:
            - name: models-volume
              mountPath: /root/.ollama
      volumes:
        - name: models-volume
          hostPath:
            path: /usr/share/ollama/.ollama
            type: Directory